# ── Server ────────────────────────────────────────────────────────────────────
server.port=3000

# Force UTC for the JVM — prevents "Asia/Calcutta" being sent to PostgreSQL
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ── Database (PostgreSQL) ──────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5433/chatapp?TimeZone=UTC
spring.datasource.username=admin
spring.datasource.password=Ammar123
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
# update  → auto-alter schema on startup (use validate or migrate in production)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ────────────────────────────────────────────────────────────────────────
# Must be at least 32 chars for HS256
app.jwt.secret=d048a9069b9bc11bde6826a7d12e9ddfc24fd3c701e71bb7326e89a86ffcdc3a
# Expiry in milliseconds: 5h = 18000000
app.jwt.expiration-ms=18000000

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.com.chatflow=DEBUG
logging.level.org.springframework.security=WARN
