version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: chat_postgres

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Ammar123
      POSTGRES_DB: chatapp

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: chat_redis

    ports:
      - "6379:6379"

volumes:
  postgres_data: